  - name: "⚡ 自动选择"
    type: url-test
    use:
      - liangxin
    proxies:
      - "🇯🇵 JP Softbank PL"
      - "🇯🇵 JP Lanmao PL"
      - "🇺🇸 US Bandwagon PL"
      - "🇺🇸 US CloudCone PL"
      - "🇺🇸 US CloudCone QH"
