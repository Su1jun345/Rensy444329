    interval: 600
    tolerance: 100
    timeout: 3000

  - name: "🇭🇰 香港"
    type: select
    use:
      - liangxin
    filter: "(?i)(HK|Hong Kong|香港|港)"
    proxies:
      - "⚡ 自动选择"

  - name: "🇯🇵 日本"
    type: select
    use:
      - liangxin
    filter: "(?i)(JP|Japan|日本)"
