dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  prefer-h3: false
  enhanced-mode: redir-host
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - "https://dns.alidns.com/dns-query"
    - "https://doh.pub/dns-query"
  proxy-server-nameserver:
    - "https://1.1.1.1/dns-query"
    - "https://dns.google/dns-query"
  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver-policy:
    "geosite:cn":
      - 223.5.5.5
      - 119.29.29.29
    "geosite:private":
      - 223.5.5.5
      - 119.29.29.29

sniffer:
  enable: true
  sniff:
    TLS:
      ports:
        - 443
        - 8443
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    QUIC:
      ports:
        - 443
        - 8443
  force-dns-mapping: false
  parse-pure-ip: false
  override-destination: false
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

tun:
  enable: true
  stack: gvisor
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-detect-interface: true

rules:
  - RULE-SET,private,DIRECT
  - RULE-SET,private_ip,DIRECT,no-resolve
  - RULE-SET,ads,🛡️ 广告拦截
  - RULE-SET,cn,DIRECT
  - RULE-SET,cn_ip,DIRECT,no-resolve
  - RULE-SET,ai,🤖 国外AI
  - RULE-SET,youtube,📺 YouTube
  - RULE-SET,google,🔍 Google
  - RULE-SET,google_ip,🔍 Google,no-resolve
  - RULE-SET,telegram,✈️ Telegram
  - RULE-SET,telegram_ip,✈️ Telegram,no-resolve
  - RULE-SET,twitter,🐦 Twitter
  - RULE-SET,twitter_ip,🐦 Twitter,no-resolve
  - RULE-SET,emby,🎬 Emby
  - RULE-SET,emby_ip,🎬 Emby,no-resolve
  - RULE-SET,spotify,🎵 Spotify
  - DOMAIN-KEYWORD,openai,🤖 国外AI
  - DOMAIN-KEYWORD,chatgpt,🤖 国外AI
  - DOMAIN-KEYWORD,claude,🤖 国外AI
  - DOMAIN-KEYWORD,anthropic,🤖 国外AI
  - DOMAIN-KEYWORD,gemini,🤖 国外AI
  - DOMAIN-KEYWORD,copilot,🤖 国外AI
  - DOMAIN-SUFFIX,openai.com,🤖 国外AI
  - DOMAIN-SUFFIX,ai.com,🤖 国外AI
  - DOMAIN-SUFFIX,telegram.org,✈️ Telegram
  - DOMAIN-SUFFIX,t.me,✈️ Telegram
  - DOMAIN-SUFFIX,x.com,🐦 Twitter
  - DOMAIN-KEYWORD,torrent,📥 下载专用
  - MATCH,🚀 节点选择
