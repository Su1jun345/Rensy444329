# ============================================================
# Clash Premium 完整配置
# 规则集: Loyalsoldier（GFW/中国IP）+ ACL4SSR（服务专项）
# 节点源: 星渡 StarFerry via proxy-provider
# ============================================================

mixed-port: 7890
allow-lan: false
bind-address: '*'
mode: rule
log-level: info
ipv6: false
find-process-mode: strict
unified-delay: true          # 统一显示延迟（去除握手延迟偏差）
tcp-concurrent: true         # TCP 并发，提升首连速度

external-controller: 127.0.0.1:9090
# secret: ""

# ============================================================
# DNS —— fake-ip 模式，国内走阿里/腾讯，国外走 fallback
# ============================================================
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.localhost'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    - 'localhost.ptlogin2.qq.com'
    - 'localhost.sec.qq.com'
    - '+.stun.*.*'
    - '+.stun.*.*.*'
    - '+.stun.*.*.*.*'
    - 'stun.l.google.com'
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fallback:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
  nameserver-policy:
    'geosite:cn':
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query

